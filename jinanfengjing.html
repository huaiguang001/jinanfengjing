<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画作导览</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f0eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .player-card {
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
        }
        .art-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h2 {
            color: #2c1810;
            margin-bottom: 8px;
        }
        .artist {
            color: #8b7355;
            margin-bottom: 30px;
            font-size: 16px;
        }
        audio {
            width: 100%;
            margin: 20px 0;
            border-radius: 40px;
        }
        .instruction {
            color: #aaa;
            font-size: 13px;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <div class="art-icon">🖼️</div>
        <h2>《济南风景》</h2>
        <div class="artist">宋佳颖</div>
        <audio controls autoplay>
            <source src="https://huaiguang001.github.io/jinanfengjing" type="audio/mpeg">
            您的浏览器不支持音频播放
        </audio>
        <div class="instruction">🎧 戴上耳机体验更佳</div>
    </div>
</body>
</html>
